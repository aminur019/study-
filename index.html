<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ff7675">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="জাদুকরী খাতা">
  <title>ছোটমণিদের জাদুকরী লেখার খাতা 🎨✨</title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js">
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@400;500;700;800&family=Hind+Siliguri:wght@400;500;700&family=Comic+Neue:wght@400;700&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Anek Bangla', 'Hind Siliguri', system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      transition: background-image 0.5s ease;
    }
    .font-kids-en { font-family: 'Comic Neue', 'Arial Rounded MT Bold', 'Arial', sans-serif; font-weight: 700; }
    .font-kids-bn { font-family: 'Anek Bangla', 'Hind Siliguri', system-ui, sans-serif; font-weight: 700; }
    .font-kids-ar { font-family: 'Noto Naskh Arabic', 'Times New Roman', serif; font-weight: 700; }

    @keyframes playful-bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.03); }
    }
    .bounce-hover:hover { animation: playful-bounce 0.6s infinite ease-in-out; }

    /* অনুভূমিক স্লাইডার (মোবাইল) */
    .kids-slider-horizontal {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #ff7675, #fab1a0, #ffeaa7, #55efc4, #74b9ff, #a29bfe);
      outline: none;
      cursor: pointer;
    }
    .kids-slider-horizontal::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      border: 3px solid #ff7675;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    /* উল্লম্ব স্লাইডার (ডেস্কটপ) */
    .kids-slider-vertical {
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to top, #ff7675, #fab1a0, #ffeaa7, #55efc4, #74b9ff, #a29bfe);
      border-radius: 9999px;
      width: 12px;
      height: 80px;
      outline: none;
      writing-mode: vertical-lr;
      direction: rtl;
    }
    .kids-slider-vertical::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #ffffff;
      border: 4px solid #ff7675;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    /* টুল প্যানেল */
    #toolPanel {
      backdrop-filter: blur(16px);
      transition: all 0.3s ease;
      z-index: 50;
    }

    /* মোবাইল: নিচে ফিক্সড */
    @media (max-width: 767px) {
      #toolPanel {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: row !important;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        border: 3px solid #c4b5fd;
        height: auto;
        width: auto;
        max-width: 95vw;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      #toolPanel button {
        flex-shrink: 0;
        width: 38px;
        height: 38px;
        border-radius: 14px;
      }

      #toolPanel button i {
        font-size: 16px;
      }

      #toolPanel .divider-v {
        width: 2px;
        height: 28px;
        flex-shrink: 0;
      }

      #toolPanel .divider-h {
        display: none;
      }

      #sizeLabel,
      #toolPanel span.text-\\[9px\\] {
        font-size: 7px;
        white-space: nowrap;
        padding: 2px 5px;
      }

      #toolPanel .slider-group {
        flex-direction: row;
        align-items: center;
        gap: 4px;
      }
    }

    /* ডেস্কটপ: বামে ফিক্সড */
    @media (min-width: 768px) {
      #toolPanel {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        flex-direction: column !important;
        align-items: center;
        gap: 10px;
        padding: 14px 8px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        border: 3px solid #c4b5fd;
        height: 60%;
        width: 68px;
      }

      #toolPanel button {
        width: 48px;
        height: 48px;
        border-radius: 16px;
      }

      #toolPanel button i {
        font-size: 20px;
      }

      #toolPanel .divider-v {
        display: none;
      }

      #toolPanel .divider-h {
        width: 42px;
        height: 2px;
        flex-shrink: 0;
      }

      #toolPanel .slider-group {
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
    }

    /* থিম ব্যাকগ্রাউন্ড */
    body.theme-cloud {
      background-color: #e0f2fe;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='25' fill='white' opacity='0.6'/%3E%3Ccircle cx='35' cy='25' r='10' fill='white' opacity='0.8'/%3E%3Ccircle cx='20' cy='35' r='15' fill='white' opacity='0.5'/%3E%3C/svg%3E");
      background-size: 120px 120px;
    }
    body.theme-jungle {
      background-color: #d4f5d4;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolygon points='40,5 55,40 25,40' fill='%236b8c42' opacity='0.3'/%3E%3Crect x='35' y='40' width='10' height='20' fill='%238B4513' opacity='0.3'/%3E%3C/svg%3E");
      background-size: 100px 100px;
    }
    body.theme-ocean {
      background-color: #b3e0ff;
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,20 Q25,5 50,20 T100,20' fill='none' stroke='white' stroke-width='3' opacity='0.5'/%3E%3C/svg%3E");
      background-size: 150px 60px;
    }
    body.theme-castle {
      background-color: #f7e3ff;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='80' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='15' y='30' width='30' height='50' fill='%23e0a3ff' opacity='0.3'/%3E%3Crect x='5' y='20' width='15' height='25' fill='%23e0a3ff' opacity='0.3'/%3E%3Crect x='40' y='20' width='15' height='25' fill='%23e0a3ff' opacity='0.3'/%3E%3C/svg%3E");
      background-size: 100px 120px;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .mascot {
      position: fixed; bottom: 20px; right: 20px; z-index: 1000; font-size: 2.5rem;
      animation: bounce 1s infinite; cursor: pointer;
      filter: drop-shadow(0 0 6px rgba(255,255,0,0.7));
    }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .animate-pop { animation: pop 0.3s ease-in-out; }

    .install-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between;
      transform: translateY(-100%); transition: transform 0.4s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .install-banner.show { transform: translateY(0); }
    .install-btn {
      background: white; color: #764ba2; border: none; padding: 8px 18px;
      border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .dismiss-btn {
      background: transparent; color: white; border: none; font-size: 20px;
      cursor: pointer; padding: 4px 8px;
    }
    .offline-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 4px; vertical-align: middle;
    }
    .offline-dot.online { background: #2ed573; }
    .offline-dot.offline { background: #ff4757; }

    .gallery-item {
      transition: all 0.2s ease;
    }
    .gallery-item:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body class="w-full h-full overflow-hidden theme-cloud text-slate-800 antialiased selection:bg-transparent" id="mainBody">

  <!-- ইনস্টল ব্যানার -->
  <div class="install-banner" id="installBanner">
    <span style="display:flex;align-items:center;gap:8px;">
      <i class="fa-solid fa-download text-xl"></i>
      <span style="font-weight:bold;font-size:14px;">📱 অ্যাপটি ইনস্টল করো!</span>
    </span>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="install-btn" id="installBtn">ইনস্টল ✨</button>
      <button class="dismiss-btn" id="dismissBtn">✕</button>
    </div>
  </div>

  <!-- মাসকট -->
  <div class="mascot hidden" id="mascot" title="আমি তোমার বন্ধু!">🧚‍♀️</div>

  <!-- গ্যালারি মডাল -->
  <div class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[1000] hidden items-center justify-center p-3" id="galleryOverlay">
    <div class="bg-white rounded-3xl max-w-2xl w-full p-4 shadow-2xl border-4 border-pink-300 max-h-[90vh] flex flex-col">
      <div class="flex justify-between items-center mb-3">
        <span class="text-xl font-black text-pink-600">🖼️ আমার আর্ট গ্যালারি</span>
        <button class="w-8 h-8 rounded-full bg-rose-100 text-rose-600 font-bold flex items-center justify-center" id="galleryClose"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="overflow-y-auto no-scrollbar flex flex-wrap gap-2 justify-center p-2" id="galleryImages"></div>
      <div class="flex gap-2 mt-3">
        <button class="flex-1 py-2 bg-pink-500 text-white rounded-xl font-bold" id="clearGalleryBtn">🗑️ সব মুছো</button>
        <button class="flex-1 py-2 bg-blue-500 text-white rounded-xl font-bold" id="downloadAllBtn">📥 সব ডাউনলোড</button>
      </div>
    </div>
  </div>

  <div class="flex flex-col w-screen h-screen h-[100dvh] relative">
    <!-- টপ বার -->
    <header class="flex-shrink-0 flex items-center justify-between px-3 py-2 bg-white/80 backdrop-blur-md border-b-4 border-yellow-300 shadow-sm z-30 gap-2">
      <button class="bounce-hover flex items-center gap-1.5 px-3 py-2 rounded-2xl bg-gradient-to-r from-purple-500 to-indigo-600 text-white font-bold text-xs md:text-sm shadow-md border-b-4 border-indigo-800 active:transform active:translate-y-1 transition-all" id="btnSubject">
        <i class="fa-solid fa-layer-group text-base text-yellow-300 hidden"></i>
        <span class="text-2xl"> 📚</span>
      </button>
      <div class="bg-amber-100 border-2 border-amber-400 px-2 py-1 rounded-full shadow-inner flex items-center gap-1 truncate max-w-[35%]">
        <span class="offline-dot online" id="onlineDot"></span>
        <span class="text-wrap text-xs md:text-sm font-black text-amber-800 font-kids-bn truncate " id="subjectBadge">বাংলা স্বরবর্ণ </span>
      </div>
      <div class="flex items-center gap-1">
        <button class="w-10 h-10 rounded-full bg-gradient-to-b from-sky-400 to-blue-500 text-white shadow-md border-b-4 border-blue-700 flex items-center justify-center active:scale-90 transition-transform" id="speakBtn" title="আবার শোনো 🔊">
          <i class="fa-solid fa-volume-high text-lg"></i>
        </button>
        <select id="themeSelect" class="text-xs p-1 rounded-lg bg-white border-2 border-slate-300 font-bold cursor-pointer">
          <option value="theme-cloud">☁️ মেঘ</option>
          <option value="theme-jungle">🌳 জঙ্গল</option>
          <option value="theme-ocean">🌊 সমুদ্র</option>
          <option value="theme-castle">🏰 রাজপ্রাসাদ</option>
        </select>
        <div class="text-center cursor-pointer min-w-[45px]">
          <div class="text-2xl md:text-4xl font-black text-pink-600 font-kids-bn" id="currentWordDisplay">অ</div>
        </div>
        <div class="flex items-center gap-1 text-yellow-500 text-lg font-black" id="starDisplay">⭐0</div>
      </div>
    </header>

    <!-- মেইন প্লে-গ্রাউন্ড -->
    <main class="flex-1 flex flex-row p-2 md:p-4 gap-2 md:gap-4 min-height-0 relative">
      <div class="flex-1 relative overflow-hidden rounded-3xl bg-white shadow-2xl border-4 md:border-8 border-yellow-400 min-h-0" id="canvasContainer">
        
        <!-- টুল প্যানেল -->
        <div id="toolPanel" class="flex items-center gap-3 bg-white/90  backdrop-blur-md p-2 rounded-3xl shadow-xl border-4 border-purple-200 z-50 sm:bottom-0 ">
          <button class="flex items-center justify-center transition-all shadow-md active:scale-95 bg-gradient-to-b from-indigo-400 to-indigo-500 text-white border-b-4 border-indigo-700" id="penModeBtn" title="পেন">
            <i class="fa-solid fa-pencil text-2xl md:text-3xl"></i>
          </button>
          <button class="flex items-center justify-center transition-all shadow-md active:scale-95 bg-white text-slate-600 border-b-4 border-slate-200" id="eraserModeBtn" title="রাবার">
            <i class="fa-solid fa-eraser text-2xl md:text-3xl"></i>
          </button>
          
          <div class="divider-v bg-slate-200 rounded-full"></div>
          <div class="divider-h bg-slate-200 rounded-full"></div>
          
          <div class="slider-group flex items-center gap-2">
            <span id="sizeLabel" class="text-[9px] font-black text-purple-700 bg-purple-100 px-1.5 py-0.5 rounded-full whitespace-nowrap">পেন</span>
            <input id="sizeSlider" type="range" min="4" max="50" value="15" class="cursor-pointer">
          </div>
          
          <div class="divider-v bg-slate-200 rounded-full"></div>
          <div class="divider-h bg-slate-200 rounded-full"></div>
          
          <div class="slider-group flex items-center gap-2">
            <span class="text-[9px] font-black text-emerald-700 bg-emerald-100 px-1.5 py-0.5 rounded-full whitespace-nowrap">ফন্ট</span>
            <input id="fontScaleSlider" type="range" min="20" max="150" value="100" class="cursor-pointer" title="পিছনের অক্ষরের সাইজ">
          </div>
        </div>

        <canvas id="guideCanvas" class="absolute inset-0 w-full h-full z-1 rounded-2xl pointer-events-none"></canvas>
        <canvas id="drawCanvas" class="absolute inset-0 w-full h-full z-2 rounded-2xl touch-none cursor-pointer"></canvas>
        <div class="absolute inset-0 w-full h-full pointer-events-none z-1 opacity-50 flex items-center justify-center" id="guideOverlay"></div>
        <div class="absolute inset-x-0 bottom-0 py-4 gap-2 flex flex-row justify-center bg-black/30 md:inset-y-0 md:right-0 md:left-auto md:px-4 md:flex-col" id="colorPaletteCard"></div>
      </div>
    </main>

    <footer class="flex-shrink-0 bg-white/95 backdrop-blur-md px-3 py-3 border-t-4 border-purple-300 shadow-xl z-20">
      <div class="max-w-4xl mx-auto flex items-center justify-between gap-3">
        <button class="bounce-hover flex-1 py-3 rounded-2xl bg-gradient-to-r from-amber-400 to-amber-500 text-white shadow border-b-4 border-amber-700 disabled:opacity-30 disabled:pointer-events-none text-center flex items-center justify-center" id="prevBtn"><i class="fa-solid fa-circle-arrow-left text-2xl"></i></button>
        <button class="bounce-hover flex-1 py-3 rounded-2xl bg-slate-100 text-slate-700 border-b-4 border-slate-300 flex items-center justify-center" id="undoBtn"><i class="fa-solid fa-rotate-left text-2xl text-indigo-500"></i></button>
        <button class="bounce-hover flex-1 py-3 rounded-2xl bg-slate-100 text-slate-700 border-b-4 border-slate-300 flex items-center justify-center" id="redoBtn"><i class="fa-solid fa-rotate-right text-2xl text-emerald-500"></i></button>
        <button class="bounce-hover flex-1 py-3 rounded-2xl bg-gradient-to-r from-rose-400 to-rose-500 text-white shadow border-b-4 border-rose-700 flex items-center justify-center" id="btnClear"><i class="fa-solid fa-trash-can text-2xl"></i></button>
        <button class="bounce-hover flex-1 py-3 rounded-2xl bg-gradient-to-r from-emerald-400 to-emerald-500 text-white shadow border-b-4 border-emerald-700 disabled:opacity-30 disabled:pointer-events-none flex items-center justify-center" id="nextBtn"><i class="fa-solid fa-circle-arrow-right text-2xl"></i></button>
      </div>
      <div class="text-center text-[11px] font-bold text-slate-400 mt-1.5" id="wordCounter">১ নং পাতা</div>
      <div class="flex justify-center gap-2 mt-1">
        <button class="text-xs bg-pink-100 text-pink-700 px-3 py-1 rounded-full font-bold" id="galleryBtn"><i class="fa-regular fa-image"></i> গ্যালারি</button>
      </div>
    </footer>

    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[999] hidden items-center justify-center p-3 transition-all duration-300" id="popupOverlay">
      <div class="bg-gradient-to-b from-purple-50 to-white rounded-3xl max-w-2xl w-full p-4 md:p-6 shadow-2xl border-4 border-purple-400 scale-95 transition-transform duration-300 transform flex flex-col max-h-[90vh]" id="popupBox">
        <div class="flex items-center justify-between border-b-4 border-dashed border-purple-100 pb-2 mb-3">
          <div class="text-lg md:text-2xl font-black text-purple-800 flex items-center gap-2">✨ জাদুকরী সিলেবাস বাক্স 🎒</div>
          <button class="w-9 h-9 rounded-full bg-rose-100 text-rose-600 font-bold flex items-center justify-center border-b-4 border-rose-300 hover:bg-rose-200" id="popupClose"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <div class="flex flex-row gap-1.5 overflow-x-auto pb-2 mb-3 border-b border-slate-200 no-scrollbar" id="tabContainer">
          <button class="tab-btn px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm whitespace-nowrap transition-all bg-purple-600 text-white" data-tab="bn_tab">🇧🇩 বাংলা</button>
          <button class="tab-btn px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm whitespace-nowrap transition-all bg-slate-200 text-slate-700" data-tab="en_tab">🇺🇸 ইংরেজি</button>
          <button class="tab-btn px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm whitespace-nowrap transition-all bg-slate-200 text-slate-700" data-tab="ar_tab">🕌 আরবি</button>
          <button class="tab-btn px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm whitespace-nowrap transition-all bg-slate-200 text-slate-700" data-tab="math_tab">🔢 অংক</button>
          <button class="tab-btn px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm whitespace-nowrap transition-all bg-slate-200 text-slate-700" data-tab="draw_tab">🎨 অংকন</button>
        </div>
        <div class="flex-1 overflow-y-auto no-scrollbar grid grid-cols-1 sm:grid-cols-2 gap-2.5 p-1" id="popupBody"></div>
      </div>
    </div>
  </div>

  <script>
    // স্লাইডার ক্লাস আপডেট
    function updateSliderClass() {
      const sizeSlider = document.getElementById("sizeSlider");
      const fontScaleSlider = document.getElementById("fontScaleSlider");
      const isMobile = window.innerWidth < 768;
      [sizeSlider, fontScaleSlider].forEach(slider => {
        if (!slider) return;
        if (isMobile) {
          slider.classList.remove("kids-slider-vertical");
          slider.classList.add("kids-slider-horizontal");
        } else {
          slider.classList.remove("kids-slider-horizontal");
          slider.classList.add("kids-slider-vertical");
        }
      });
    }
    updateSliderClass();
    window.addEventListener("resize", updateSliderClass);

    (function() {
      'use strict';

      // ======================== PWA সেটআপ ========================
      let deferredPrompt = null;
      const installBanner = document.getElementById('installBanner');
      const installBtn = document.getElementById('installBtn');
      const dismissBtn = document.getElementById('dismissBtn');
      const onlineDot = document.getElementById('onlineDot');

      function updateOnlineStatus() {
        if (navigator.onLine) {
          onlineDot.className = 'offline-dot online';
          onlineDot.title = 'অনলাইন';
        } else {
          onlineDot.className = 'offline-dot offline';
          onlineDot.title = 'অফলাইন';
        }
      }

      function playBeep(f = 800, d = 0.1, t = 'sine') {
        try {
          const a = new (window.AudioContext || window.webkitAudioContext)();
          const o = a.createOscillator();
          const g = a.createGain();
          o.type = t;
          o.frequency.value = f;
          g.gain.value = 0.3;
          g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + d);
          o.connect(g);
          g.connect(a.destination);
          o.start();
          o.stop(a.currentTime + d);
        } catch(e) {}
      }

      function speak(text, lang = 'bn-BD') {
        try {
          if (!('speechSynthesis' in window)) return;
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.lang = lang;
          u.rate = 0.9;
          u.pitch = 1.2;
          const setV = () => {
            const v = window.speechSynthesis.getVoices();
            if (!v.length) { setTimeout(setV, 100); return; }
            let s = v.find(x => x.lang === lang) || v.find(x => x.lang.startsWith(lang.split('-')[0]));
            if (s) { u.voice = s; window.speechSynthesis.speak(u); } else playBeep(800, 0.1);
          };
          window.speechSynthesis.getVoices().length ? setV() : (window.speechSynthesis.onvoiceschanged = setV);
        } catch(e) {}
      }

      function makeNumbers(start, end, isEn, isAr) {
        const bnDigits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
        const arDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];

      function downloadAllAsCollage() {
        if (savedGallery.length === 0) { alert('গ্যালারিতে কোনো আর্ট নেই!'); return; }
        const cols = Math.min(savedGallery.length, 4);
        const rows = Math.ceil(savedGallery.length / cols);
        const cellSize = 300;
        const collageCanvas = document.createElement('canvas');
        collageCanvas.width = cols * cellSize;
        collageCanvas.height = rows * cellSize;
        const ctx = collageCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, collageCanvas.width, collageCanvas.height);
        let loadedCount = 0;
        savedGallery.forEach((item, i) => {
          const img = new Image();
          img.onload = () => {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const x = col * cellSize;
            const y = row * cellSize;
            const padding = 10;
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(x + padding, y + padding, cellSize - padding*2, cellSize - padding*2);
            ctx.drawImage(img, x + padding, y + padding, cellSize - padding*2, cellSize - padding*2);
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 2;
            ctx.strokeRect(x + padding, y + padding, cellSize - padding*2, cellSize - padding*2);
            ctx.fillStyle = '#666';
            ctx.font = '12px Arial';
            ctx.fillText('#' + (i + 1), x + padding + 5, y + padding + 20);
            loadedCount++;
            if (loadedCount === savedGallery.length) {
              const link = document.createElement('a');
              link.download = 'আমার-আর্ট-গ্যালারি-' + new Date().toISOString().slice(0,10) + '.png';
              link.href = collageCanvas.toDataURL('image/png');
              link.click();
              playStar();
            }
          };
          img.src = item.dataURL;
        });
      }

      function drawColoringOutline(type, ctx, w, h) {
        ctx.save(); ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        const cx = w/2, cy = h/2, size = Math.min(w,h)*0.35;
        ctx.beginPath();
        if (type === 'apple') {
          ctx.arc(cx-size*0.25, cy, size*0.45, 0.2*Math.PI, 1.7*Math.PI); ctx.arc(cx+size*0.25, cy, size*0.45, 1.3*Math.PI, 0.8*Math.PI); ctx.closePath(); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(cx, cy-size*0.35); ctx.quadraticCurveTo(cx+10, cy-size*0.65, cx+15, cy-size*0.7); ctx.stroke();
        } else if (type === 'flower') {
          for (let i=0; i<5; i++) { const angle = (i*2*Math.PI)/5; ctx.beginPath(); ctx.arc(cx+Math.cos(angle)*size*0.45, cy+Math.sin(angle)*size*0.45, size*0.3, 0, 2*Math.PI); ctx.stroke(); }
          ctx.beginPath(); ctx.fillStyle="#fff"; ctx.arc(cx, cy, size*0.25, 0, 2*Math.PI); ctx.fill(); ctx.stroke();
        } else if (type === 'tree') {
          ctx.moveTo(cx-size*0.1, cy+size*0.5); ctx.lineTo(cx-size*0.1, cy+size*0.1); ctx.lineTo(cx+size*0.1, cy+size*0.1); ctx.lineTo(cx+size*0.1, cy+size*0.5); ctx.closePath(); ctx.stroke();

      function renderGuide() {
        const w = container.getBoundingClientRect().width;
        const h = container.getBoundingClientRect().height;
        const sub = getSubjectData();
        const item = getCurrentItem();
        if (sub.type === 'empty') { guideCtx.clearRect(0, 0, w, h); guideOverlay.innerHTML = ''; return; }
        if (sub.type === 'coloring') { guideCtx.clearRect(0, 0, w, h); drawColoringOutline(item, guideCtx, w, h); fontScaleSlider.disabled = true; return; }
        fontScaleSlider.disabled = false;
        const textToDraw = sub.type === 'word' ? item.w : item;
        const fontFamily = getFontFamily();
        const baseSize = Math.min(w, h);
        let fSize = baseSize * 0.55 * (backgroundFontScale / 100);
        if (sub.type === 'word') fSize = baseSize * 0.35 * (backgroundFontScale / 100);
        document.fonts.ready.then(() => {
          guideCtx.clearRect(0, 0, w, h);
          guideOverlay.innerHTML = '';
          guideCtx.textAlign = 'center';
          guideCtx.textBaseline = 'middle';
          guideCtx.font = `700 ${fSize}px ${fontFamily}`;
          while (guideCtx.measureText(textToDraw).width > w * 0.9) { fSize -= 5; guideCtx.font = `700 ${fSize}px ${fontFamily}`; }
          const cx = w / 2, cy = h / 2;
          guideCtx.fillStyle = '#e2e8f0'; guideCtx.fillText(textToDraw, cx, cy);
          guideCtx.strokeStyle = '#94a3b8'; guideCtx.lineWidth = 2; guideCtx.setLineDash([4, 6]);
          guideCtx.strokeText(textToDraw, cx, cy); guideCtx.setLineDash([]);
          guideCtx.fillStyle = '#cbd5e1'; guideCtx.fillText(textToDraw, cx, cy);
          drawLines();
          if (sub.type === 'word') {
            guideOverlay.innerHTML = `<div class="absolute bottom-4 left-4 right-4 bg-purple-100 text-purple-900 font-bold p-2.5 rounded-xl border border-purple-300 text-center text-xs md:text-sm shadow-md">${item.ex}</div>`;
          }
        });
      }

      function redraw() {
        drawCtx.clearRect(0,0,container.getBoundingClientRect().width, container.getBoundingClientRect().height);
        allStrokes.forEach(stroke => {
          if (stroke.points.length < 1) return;
          drawCtx.save();
          drawCtx.globalCompositeOperation = stroke.color==='eraser' ? 'destination-out' : 'source-over';
          drawCtx.strokeStyle = stroke.color==='eraser' ? 'rgba(0,0,0,1)' : stroke.color;
          drawCtx.lineWidth = stroke.width;
          drawCtx.lineCap = 'round'; drawCtx.lineJoin = 'round';
          drawCtx.beginPath();
          drawCtx.moveTo(stroke.points[0].x, stroke.points[0].y);
          stroke.points.forEach(p => drawCtx.lineTo(p.x, p.y));
          drawCtx.stroke();
          drawCtx.restore();
        });
      }

      function getMouseCoords(e) {
        const rect = drawCanvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
      }

      function startDrawing(e) {
        isDrawing = true; redoStack = [];
        const coords = getMouseCoords(e);
        allStrokes.push({ points: [coords], color: isEraserActive ? 'eraser' : currentColor, width: currentSize });
        redraw();
        if (isEraserActive) playEraser(); else playPen();
      }

      function moveDrawing(e) {
        if (!isDrawing) return;
        allStrokes[allStrokes.length-1].points.push(getMouseCoords(e));
        redraw();
      }

      drawCanvas.addEventListener('mousedown', startDrawing);
      drawCanvas.addEventListener('mousemove', moveDrawing);
      window.addEventListener('mouseup', () => isDrawing = false);
      drawCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); }, {passive: false});
      drawCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveDrawing(e); }, {passive: false});
      window.addEventListener('touchend', () => isDrawing = false);

      function setMode(eraser) {
        isEraserActive = eraser;
        const isMobile = window.innerWidth < 768;
        const btnClass = isMobile ? 'w-[38px] h-[38px] rounded-[14px]' : 'w-12 h-12 md:w-14 md:h-14 rounded-2xl';
        const iconClass = isMobile ? 'text-base' : 'text-2xl md:text-3xl';

        if (eraser) {
          eraserModeBtn.className = `${btnClass} flex items-center justify-center bg-gradient-to-b from-pink-400 to-pink-500 text-white border-b-4 border-pink-700 scale-105 shadow-inner transition-all`;
          penModeBtn.className = `${btnClass} flex items-center justify-center bg-white text-slate-600 border-b-4 border-slate-200 transition-all`;
          eraserModeBtn.querySelector('i').className = `fa-solid fa-eraser ${iconClass}`;
          penModeBtn.querySelector('i').className = `fa-solid fa-pencil ${iconClass}`;
          sizeLabel.textContent = 'রাবার';
        } else {
          penModeBtn.className = `${btnClass} flex items-center justify-center bg-gradient-to-b from-indigo-400 to-indigo-500 text-white border-b-4 border-indigo-700 scale-105 shadow-inner transition-all`;
          eraserModeBtn.className = `${btnClass} flex items-center justify-center bg-white text-slate-600 border-b-4 border-slate-200 transition-all`;
          penModeBtn.querySelector('i').className = `fa-solid fa-pencil ${iconClass}`;
          eraserModeBtn.querySelector('i').className = `fa-solid fa-eraser ${iconClass}`;
          sizeLabel.textContent = 'পেন';
        }
        buildPalette();
      }

      function loadPage(key, idx) {
        if (key) { currentKey = key; currentIndex = 0; }
        if (idx !== undefined) currentIndex = idx;
        allStrokes = []; redoStack = [];
        resize(); syncUI(); speakCurrentItem();
      }

      function syncUI() {
        const sub = getSubjectData();
        const item = sub.items[currentIndex];
        const icons = { apple:'🍏', flower:'🌸', tree:'🌳', mango:'🥭', watermelon:'🍉', house:'🏠', boat:'⛵', car:'🚗', fish:'🐟', bird:'🐦', umbrella:'☂️', banana:'🍌', orange:'🍊', grape:'🍇', pineapple:'🍍', coconut:'🥥', strawberry:'🍓', cherry:'🍒', sun:'☀️', moon:'🌙', star:'⭐', cloud:'☁️', rainbow:'🌈', snowflake:'❄️', bicycle:'🚲', bus:'🚌', train:'🚆', airplane:'✈️', helicopter:'🚁', rocket:'🚀', school:'🏫', hospital:'🏥', castle:'🏰', tent:'⛺', book:'📚', pencil:'✏️', notebook:'📓', ruler:'📏', scissors:'✂️', ball:'⚽', kite:'🪁', puzzle:'🧩', trophy:'🏆', clock:'⏰', gift:'🎁', balloon:'🎈', cake:'🎂', candle:'🕯️', music:'🎵', heart:'❤️' };
        if (sub.type === 'coloring') currentWordDisplay.textContent = icons[item] || '🎨';
        else if (sub.type === 'empty') currentWordDisplay.textContent = '⬜';
        else if (sub.type === 'word') currentWordDisplay.textContent = item.w;
        else currentWordDisplay.textContent = item;
        subjectBadge.textContent = sub.name;
        wordCounter.textContent = sub.type==='empty' ? 'খালি স্লেট' : `${currentIndex+1} / ${getTotalItems()} নং পাতা`;
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex >= getTotalItems()-1;
      }

      function renderPopupContent() {
        const data = syllabus[currentActiveTab];
        popupBody.innerHTML = Object.entries(data).map(([k,v]) => `
          <button class="group relative overflow-hidden p-3.5 rounded-2xl border-4 text-left transition-all active:scale-95 ${k===currentKey ? 'bg-gradient-to-br from-purple-600 to-indigo-600 border-purple-800 text-white shadow-xl' : 'bg-white border-slate-200 text-slate-700 hover:border-purple-300'}" data-choice="${k}">
            <div class="flex items-center gap-3 relative z-10">
              <span class="text-2xl p-2 rounded-xl bg-slate-100 ${k===currentKey ? '!bg-white/20' : ''}">${v.icon}</span>
              <div class="flex flex-col"><span class="font-black text-xs md:text-sm tracking-wide">${v.name}</span><span class="text-[10px] font-bold ${k===currentKey ? 'text-purple-200' : 'text-slate-400'}">${v.items.length>1 ? v.items.length+'টি পাতা' : 'ফ্রি স্টাইল'}</span></div>
            </div>
          </button>`).join('');
        popupBody.querySelectorAll('[data-choice]').forEach(btn => {
          btn.addEventListener('click', () => { loadPage(btn.dataset.choice, 0); closePopup(); addStar(); playClick(); });
        });
      }

      function openPopup() { popupOverlay.classList.remove('hidden'); popupOverlay.classList.add('flex'); setTimeout(() => document.getElementById('popupBox').classList.remove('scale-95'), 10); renderPopupContent(); }

      document.getElementById('tabContainer').addEventListener('click', (e) => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm whitespace-nowrap transition-all bg-slate-200 text-slate-700");
        btn.className = "tab-btn px-3 py-1.5 rounded-xl font-bold text-xs md:text-sm whitespace-nowrap transition-all bg-purple-600 text-white";
        currentActiveTab = btn.dataset.tab;
        renderPopupContent();
        playClick();
      });

      document.getElementById('btnSubject').addEventListener('click', openPopup);
      document.getElementById('popupClose').addEventListener('click', closePopup);
      penModeBtn.addEventListener('click', () => { setMode(false); playClick(); });
      eraserModeBtn.addEventListener('click', () => { setMode(true); playClick(); });
      sizeSlider.addEventListener('input', (e) => currentSize = parseFloat(e.target.value));
      fontScaleSlider.addEventListener('input', (e) => { backgroundFontScale = parseFloat(e.target.value); renderGuide(); });
      undoBtn.addEventListener('click', () => { if (allStrokes.length > 0) { redoStack.push(allStrokes.pop()); redraw(); playClick(); } });
      redoBtn.addEventListener('click', () => { if (redoStack.length > 0) { allStrokes.push(redoStack.pop()); redraw(); playClick(); } });
      btnClear.addEventListener('click', () => { allStrokes = []; redoStack = []; redraw(); playBeep(400, 0.2, 'triangle'); });
      prevBtn.addEventListener('click', () => { if (currentIndex > 0) { saveArtToGallery(); loadPage(null, currentIndex-1); playClick(); } });
      nextBtn.addEventListener('click', () => { if (currentIndex < getTotalItems()-1) { saveArtToGallery(); loadPage(null, currentIndex+1); addStar(); playClick(); } });

      window.addEventListener('resize', () => {
        clearTimeout(window.resTimer);
        window.resTimer = setTimeout(resize, 100);
        setMode(isEraserActive);
        updateSliderClass();
      });

      setMode(false);
      buildPalette();
      setTimeout(resize, 150);
      syncUI();
      updateStarDisplay();
    })();
  </script>
</body>
</html>
